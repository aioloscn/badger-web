<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录中心</title>
    <link rel="stylesheet" href="https://unpkg.com/element-plus@2.8.3/dist/index.css">
    <link rel="stylesheet" href="./src/styles/app.css">
</head>
<body>
<div id="app" v-cloak>
    <div class="page">
        <div class="card">
            <div class="visual-panel">
                <div class="visual-overlay"></div>
            </div>
            <div class="form-panel">
                <div class="header">
                    <h2>登录中心</h2>
                </div>
                <el-tabs v-model="activeTab">
                    <el-tab-pane label="短信登录" name="sms">
                        <el-form label-position="top">
                            <el-form-item label="手机号">
                                <el-input v-model.trim="sms.phone" placeholder="请输入手机号" maxlength="11"></el-input>
                            </el-form-item>
                            <el-form-item label="验证码">
                                <div class="inline-row">
                                    <el-input v-model.trim="sms.code" placeholder="请输入验证码" maxlength="6"></el-input>
                                    <el-button :disabled="sms.sending || sms.countdown > 0" @click="sendSmsCode">
                                        {{ sms.countdown > 0 ? '重新发送(' + sms.countdown + ')' : '发送验证码' }}
                                    </el-button>
                                </div>
                            </el-form-item>
                            <el-button type="primary" :loading="sms.loggingIn" @click="mobileLogin">短信登录</el-button>
                        </el-form>
                    </el-tab-pane>
                </el-tabs>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/vue@3.3.4/dist/vue.global.js"></script>
<script src="https://unpkg.com/element-plus@2.8.3/dist/index.full.js"></script>
<script src="https://unpkg.com/@element-plus/icons-vue"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="./src/js/config.js"></script>
<script src="./src/js/request.js"></script>
<script src="./src/js/app.js"></script>
</body>
</html>
